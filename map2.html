<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dino Adventure - Stage 2 Cactus Bullet Proof</title>
    <style>
        * { box-sizing: border-box; user-select: none; -webkit-user-select: none; }
        body { margin: 0; padding: 0; background: #f7f7f7; display: flex; flex-direction: column; justify-content: space-between; align-items: center; height: 100vh; font-family: Arial, sans-serif; overflow: hidden; }
        #gameContainer { position: relative; width: 100%; max-width: 800px; flex-grow: 1; display: flex; justify-content: center; align-items: center; background: #fff; }
        canvas { width: 100%; height: auto; max-height: 100%; background: #fff; display: block; border-bottom: 2px solid #ccc; }
        #uiOverlay { position: absolute; top: 12px; left: 12px; font-size: 14px; font-weight: bold; color: #333; z-index: 10; background: rgba(255,255,255,0.9); padding: 6px 10px; border-radius: 6px; box-shadow: 0 2px 6px rgba(0,0,0,0.15); pointer-events: none; white-space: pre-line; }
        .controls { width: 100%; max-width: 800px; display: grid; grid-template-columns: repeat(4, 1fr); gap: 6px; padding: 10px; background: #eee; }
        .btn { padding: 13px 0; background: #333; color: #fff; border: none; border-radius: 6px; font-size: 12px; font-weight: bold; text-align: center; touch-action: manipulation; }
        .btn:active { background: #555; }
        .btn-move { background: #4A90E2; }
        .btn-move:active { background: #357ABD; }
        .btn-special { background: #9B59B6; font-size: 11px; }
        .btn-special:active { background: #8E44AD; }
        .btn-dmg { background: #E67E22; grid-column: span 2; padding: 14px 0; font-size: 13px; }
        .btn-dmg:active { background: #D35400; }
    </style>
</head>
<body>

<div id="gameContainer">
    <div id="uiOverlay">STAGE 2 | HP: 6 | Điểm: 0</div>
    <canvas id="gameCanvas" width="800" height="300"></canvas>
</div>

<div class="controls">
    <button class="btn btn-move" id="btnLeft">TRÁI</button>
    <button class="btn btn-move" id="btnRight">PHẢI</button>
    <button class="btn" id="btnJump">NHẢY</button>
    <button class="btn" id="btnAttack">ĐÁNH</button>
    <button class="btn" id="btnShoot">BẮN</button>
    <button class="btn btn-special" id="btnTimeStop">THE WORLD (8S)</button>
    <button class="btn btn-special" id="btnInvinc">BẤT TỬ (10S)</button>
    <button class="btn btn-special" id="btnSilence">KHỐNG CHẾ</button>
    <button class="btn btn-dmg" id="btnBigShoot">SIÊU ĐẠN TO (SÁT THƯƠNG 6)</button>
</div>

<script>
const canvas = document.getElementById("gameCanvas"), ctx = canvas.getContext("2d");
const uiOverlay = document.getElementById("uiOverlay");
const btnTimeStop = document.getElementById("btnTimeStop"), btnInvinc = document.getElementById("btnInvinc"), btnSilence = document.getElementById("btnSilence");

let score = 0, gameOver = false, isBossMode = false, gameSpeed = 5, gameFrame = 0;
let isTimeStopped = false, timeStopTimer = 0, timeStopCooldown = 0;
let isInvincible = false, invincTimer = 0, invincCooldown = 0;
let isSilenced = false, silenceTimer = 0, silenceCooldown = 0;
let keys = { Left: false, Right: false };

const dino = { x: 50, y: 200, width: 40, height: 50, vy: 0, gravity: 0.6, jumpForce: -12, isGrounded: true, isAttacking: false, attackTimer: 0, attackWidth: 40, color: "#2C3E50", hp: 6, maxHp: 6, speed: 4 };
const autoBow = { x: 50, y: 180, lastShotFrame: 0, cooldown: 45 };
const boss = { x: 630, y: 100, width: 130, height: 150, hp: 70, maxHp: 70, isSpawning: true, lastSkillFrame: 0, skillCooldown: 240, currentSkill: "", timer: 0, origY: 100 };
const portal = { x: 650, y: 100, width: 60, height: 150, alpha: 0, active: false };

let obstacles = [], arrows = [], playerProjectiles = [], blocks = [], cactusRain = [], bossMinions = [], bombs = [];

setupTouchBtn("btnLeft", () => keys.Left = true, () => keys.Left = false);
setupTouchBtn("btnRight", () => keys.Right = true, () => keys.Right = false);
setupTouchBtn("btnJump", () => triggerAction("jump"));
setupTouchBtn("btnAttack", () => triggerAction("attack"));
setupTouchBtn("btnShoot", () => triggerAction("shoot"));
setupTouchBtn("btnTimeStop", () => triggerAction("timestop"));
setupTouchBtn("btnInvinc", () => triggerAction("invinc"));
setupTouchBtn("btnSilence", () => triggerAction("silence"));
setupTouchBtn("btnBigShoot", () => triggerAction("bigshoot"));
canvas.addEventListener("touchstart", (e) => { e.preventDefault(); if (gameOver) resetGame(); });

function setupTouchBtn(id, start, end) {
    const el = document.getElementById(id);
    el.addEventListener("touchstart", (e) => { e.preventDefault(); start(); });
    if (end) el.addEventListener("touchend", (e) => { e.preventDefault(); end(); });
}

function triggerAction(act) {
    if (gameOver) return;
    if (act === "jump" && dino.isGrounded) { dino.vy = dino.jumpForce; dino.isGrounded = false; }
    if (act === "attack" && !dino.isAttacking) { dino.isAttacking = true; dino.attackTimer = 15; }
    if (act === "shoot" && (!isBossMode || !boss.isSpawning)) { playerProjectiles.push({ x: dino.x + dino.width, y: dino.y + 21, width: 15, height: 6, speed: 9, dmg: 1, big: false }); }
    
    if (act === "timestop" && timeStopCooldown <= 0 && !isTimeStopped) { isTimeStopped = true; timeStopTimer = 480; timeStopCooldown = 600; }
    if (act === "invinc" && invincCooldown <= 0 && !isInvincible) { isInvincible = true; invincTimer = 600; invincCooldown = 900; }
    if (act === "silence" && silenceCooldown <= 0 && !isSilenced && isBossMode) { isSilenced = true; silenceTimer = 180; silenceCooldown = 600; boss.currentSkill = ""; boss.timer = 0; boss.y = boss.origY; }
    if (act === "bigshoot" && (!isBossMode || !boss.isSpawning)) { playerProjectiles.push({ x: dino.x + dino.width, y: dino.y + 15, width: 30, height: 16, speed: 7, dmg: 6, big: true }); }
}

function resetGame() {
    score = 0; gameOver = false; isBossMode = false; gameSpeed = 5; gameFrame = 0;
    dino.x = 50; dino.y = 200; dino.vy = 0; dino.isGrounded = true; dino.hp = dino.maxHp;
    isTimeStopped = false; timeStopTimer = 0; timeStopCooldown = 0;
    isInvincible = false; invincTimer = 0; invincCooldown = 0;
    isSilenced = false; silenceTimer = 0; silenceCooldown = 0;
    boss.y = boss.origY; boss.hp = boss.maxHp; boss.isSpawning = true; boss.currentSkill = ""; boss.timer = 0;
    portal.active = false; portal.alpha = 0;
    obstacles = []; arrows = []; playerProjectiles = []; blocks = []; cactusRain = []; bossMinions = []; bombs = [];
    keys.Left = false; keys.Right = false; animate();
}

function checkCollision(r1, r2) { return r1.x < r2.x + r2.width && r1.x + r1.width > r2.x && r1.y < r2.y + r2.height && r1.y + r1.height > r2.y; }

function drawDino() {
    ctx.fillStyle = isInvincible ? "#F1C40F" : dino.color; ctx.fillRect(dino.x, dino.y, dino.width, dino.height);
    ctx.fillStyle = "#fff"; ctx.fillRect(dino.x + 25, dino.y + 10, 5, 5);
    ctx.fillStyle = "#000"; ctx.fillRect(dino.x + 28, dino.y + 12, 2, 2);
    if (dino.isAttacking) { ctx.fillStyle = "rgba(255, 69, 0, 0.7)"; ctx.fillRect(dino.x + dino.width, dino.y + 5, dino.attackWidth, dino.height - 10); }
    ctx.strokeStyle = "#7f8c8d"; ctx.lineWidth = 3; ctx.beginPath(); ctx.arc(dino.x + 10, dino.y + 15, 12, Math.PI * 0.5, Math.PI * 1.5); ctx.stroke();
}

function drawBoss() {
    ctx.fillStyle = isTimeStopped ? "#34495e" : (boss.currentSkill === "shield" ? "#3498DB" : "#6C3483"); ctx.fillRect(boss.x, boss.y, boss.width, boss.height);
    if (boss.currentSkill === "shield") { ctx.strokeStyle = "#00FFFF"; ctx.lineWidth = 4; ctx.strokeRect(boss.x - 5, boss.y - 5, boss.width + 10, boss.height + 10); }
    ctx.fillStyle = "#ccc"; ctx.fillRect(boss.x, boss.y - 25, boss.width, 10);
    ctx.fillStyle = isSilenced ? "#95a5a6" : "#FF0000"; ctx.fillRect(boss.x, boss.y - 25, (boss.hp / boss.maxHp) * boss.width, 10);
}

function drawCactus(x, y, w, h) { ctx.fillStyle = isTimeStopped ? "#7f8c8d" : "#228B22"; ctx.fillRect(x, y, w, h); }
function drawBird(x, y, w, h) { ctx.fillStyle = isTimeStopped ? "#95a5a6" : "#D2691E"; ctx.fillRect(x, y, w, h); }
function drawMinion(x, y, w, h) { ctx.fillStyle = isTimeStopped ? "#34495e" : "#E74C3C"; ctx.fillRect(x, y, w, h); ctx.fillStyle = "#00FFFF"; ctx.fillRect(x - 2, y, 4, h); }

function animate() {
    if (gameOver) {
        ctx.fillStyle = "rgba(0,0,0,0.8)"; ctx.fillRect(0, 0, canvas.width, canvas.height);
        ctx.fillStyle = "#fff"; ctx.font = "bold 24px Arial"; ctx.textAlign = "center"; ctx.fillText("GAME OVER - Chạm màn hình để phục sinh", canvas.width/2, canvas.height/2); return;
    }
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    if (isTimeStopped) { timeStopTimer--; if (timeStopTimer <= 0) isTimeStopped = false; } else if (timeStopCooldown > 0) timeStopCooldown--;
    if (isInvincible) { invincTimer--; if (invincTimer <= 0) isInvincible = false; } else if (invincCooldown > 0) invincCooldown--;
    if (isSilenced) { silenceTimer--; if (silenceTimer <= 0) isSilenced = false; } else if (silenceCooldown > 0) silenceCooldown--;

    if (!isTimeStopped) gameFrame++;
    ctx.strokeStyle = "#737373"; ctx.lineWidth = 2; ctx.beginPath(); ctx.moveTo(0, 250); ctx.lineTo(canvas.width, 250); ctx.stroke();

    if (keys.Left) { dino.x -= dino.speed; if (dino.x < 0) dino.x = 0; }
    if (keys.Right) { dino.x += dino.speed; if (isBossMode && dino.x + dino.width > boss.x) dino.x = boss.x - dino.width; else if (dino.x + dino.width > canvas.width) dino.x = canvas.width - dino.width; }
    dino.vy += dino.gravity; dino.y += dino.vy;
    let groundY = 200;

    if (dino.isAttacking) { dino.attackTimer--; if (dino.attackTimer <= 0) dino.isAttacking = false; }
    if (score >= 10 && !isBossMode) { isBossMode = true; portal.active = true; boss.lastSkillFrame = gameFrame; }

    if (!isBossMode) {
        if (!isTimeStopped && gameFrame % 85 === 0) {
            let type = Math.random() > 0.45 ? "run" : "fly";
            obstacles.push({ type: type, x: 850, y: type === "run" ? 210 : 130, width: 25, height: 40 });
        }
        if (gameFrame - autoBow.lastShotFrame > autoBow.cooldown && !isTimeStopped) {
            let t = obstacles.find(o => o.x > dino.x);
            if (t) { arrows.push({ x: dino.x + 20, y: dino.y + 10, target: t, speed: 7 }); autoBow.lastShotFrame = gameFrame; }
        }
    } else {
        if (portal.active) {
            ctx.fillStyle = "rgba(155, 89, 182, " + portal.alpha + ")"; ctx.fillRect(portal.x, portal.y, portal.width, portal.height);
            if (portal.alpha < 1) portal.alpha += 0.02; else if (boss.isSpawning) boss.isSpawning = false;
        }

        drawBoss();

        if (!boss.isSpawning && !isTimeStopped && !isSilenced) {
            if (gameFrame - boss.lastSkillFrame >= boss.skillCooldown) {
                let r = Math.random();
                if (r < 0.2) { boss.currentSkill = "shieldMinions"; boss.timer = 200; }
                else if (r < 0.4) { boss.currentSkill = "shield"; boss.timer = 180; }
                else if (r < 0.6) { boss.currentSkill = "cactusRain8s"; boss.timer = 480; }
                else if (r < 0.8) { boss.currentSkill = "bomb3dmg"; }
                else { boss.currentSkill = "smashJump"; boss.timer = 120; }
                boss.lastSkillFrame = gameFrame;
            }

            if (boss.currentSkill === "shieldMinions" && boss.timer > 0) { boss.timer--; if (gameFrame % 50 === 0) bossMinions.push({ x: boss.x, y: 210, width: 35, height: 40, hp: 2 }); }
            if (boss.currentSkill === "shield" && boss.timer > 0) boss.timer--;
            if (boss.currentSkill === "cactusRain8s" && boss.timer > 0) { boss.timer--; if (gameFrame % 10 === 0) cactusRain.push({ x: Math.random() * (boss.x - 30), y: -30, speedY: 5.5 }); }
            if (boss.currentSkill === "bomb3dmg" && gameFrame - boss.lastSkillFrame === 1) bombs.push({ x: boss.x - 20, y: boss.y + 50, speedX: -4, vy: -6 });
            if (boss.currentSkill === "smashJump" && boss.timer > 0) {
                boss.timer--;
                if (boss.timer > 90) boss.y -= 6;
                else if (boss.timer === 60) boss.x = dino.x - 45;
                else if (boss.timer < 60 && boss.timer > 30) boss.y += 12;
                else if (boss.timer <= 30) { boss.x = 630; boss.y = boss.origY; }
            }
            if (boss.timer <= 0 && boss.currentSkill !== "smashJump") boss.currentSkill = "";
        }

        for (let i = bombs.length - 1; i >= 0; i--) {
            let b = bombs[i]; if (!isTimeStopped) { b.x += b.speedX; b.vy += 0.4; b.y += b.vy; }
            ctx.fillStyle = "#E74C3C"; ctx.beginPath(); ctx.arc(b.x, b.y, 14, 0, Math.PI * 2); ctx.fill();
            if (b.y >= 236) b.y = 236;
            if (checkCollision({ x: b.x - 14, y: b.y - 14, width: 28, height: 28 }, dino)) {
                if (!isInvincible) dino.hp -= 3; bombs.splice(i, 1); if (dino.hp <= 0) gameOver = true; continue;
            }
            if (b.x < 0) bombs.splice(i, 1);
        }

        for (let i = cactusRain.length - 1; i >= 0; i--) {
            let c = cactusRain[i]; if (!isTimeStopped) c.y += c.speedY;
            drawCactus(c.x, c.y, 20, 35);
            if (checkCollision({ x: c.x, y: c.y, width: 20, height: 35 }, dino)) { if (!isInvincible) dino.hp--; cactusRain.splice(i, 1); if (dino.hp <= 0) gameOver = true; continue; }
            if (c.y > 250) cactusRain.splice(i, 1);
        }

        for (let i = bossMinions.length - 1; i >= 0; i--) {
            let m = bossMinions[i]; if (!isTimeStopped) m.x -= 3.5;
            drawMinion(m.x, m.y, m.width, m.height);
            if (dino.isAttacking && checkCollision({ x: dino.x + dino.width, y: dino.y, width: dino.attackWidth, height: dino.height }, m)) {
                m.hp--; if (m.hp <= 0) { bossMinions.splice(i, 1); score++; } dino.isAttacking = false; continue;
            }
            if (checkCollision(dino, m)) { if (!isInvincible) dino.hp--; bossMinions.splice(i, 1); if (dino.hp <= 0) gameOver = true; continue; }
            if (m.x + m.width < 0) bossMinions.splice(i, 1);
        }

        if (!boss.isSpawning && gameFrame % 130 === 0 && !isTimeStopped) blocks.push({ x: 850, y: 160, width: 60, height: 20 });
        for (let i = blocks.length - 1; i >= 0; i--) {
            if (!isTimeStopped) blocks[i].x -= 3; ctx.fillStyle = "#4682B4"; ctx.fillRect(blocks[i].x, blocks[i].y, 60, 20);
            if (dino.x + dino.width > blocks[i].x && dino.x < blocks[i].x + blocks[i].width && dino.y + dino.height <= blocks[i].y + 10 && dino.y + dino.height + dino.vy >= blocks[i].y) groundY = blocks[i].y - dino.height;
            if (blocks[i].x + 60 < 0) blocks.splice(i, 1);
        }
    }

    // XỬ LÝ ĐẠN BAY: HOÀN TOÀN KHÔNG CHECK VA CHẠM VỚI XƯƠNG RỒNG (ĐÃ SỬA TRIỆT ĐỂ)
    for (let i = playerProjectiles.length - 1; i >= 0; i--) {
        let p = playerProjectiles[i]; p.x += p.speed;
        ctx.fillStyle = p.big ? "#E67E22" : "#FFD700"; ctx.fillRect(p.x, p.y, p.width, p.height);

        // Đạn chỉ va chạm duy nhất với Boss khi ở Boss Mode
        if (isBossMode && checkCollision(p, boss)) {
            if (boss.currentSkill !== "shield") boss.hp -= p.dmg;
            playerProjectiles.splice(i, 1);
            if (boss.hp <= 0) { alert("XUẤT SẮC! BẠN ĐÃ CHIẾN THẮNG TOÀN BỘ GAME MÀN 2!"); resetGame(); return; }
            continue;
        }
        if (p.x > canvas.width) playerProjectiles.splice(i, 1);
    }

    if (dino.y >= groundY) { dino.y = groundY; dino.vy = 0; dino.isGrounded = true; }
    else if (dino.y < groundY && dino.y >= 200) { dino.y = 200; dino.vy = 0; dino.isGrounded = true; }
    drawDino();

    // Sửa lỗi logic mũi tên tự động ăn nhầm xương rồng
    for (let i = arrows.length - 1; i >= 0; i--) {
        let a = arrows[i]; 
        if (!isTimeStopped) { 
            let dx = a.target.x - a.x, dy = a.target.y - a.y, dist = Math.sqrt(dx*dx + dy*dy); 
            if (dist > 5 && obstacles.includes(a.target) && a.target.type === "fly") { 
                a.x += (dx / dist) * 7; a.y += (dy / dist) * 7; 
            } else a.x += 7; 
        }
        ctx.fillStyle = "#8B4513"; ctx.fillRect(a.x, a.y, 15, 6);
        if (checkCollision({ x: a.x, y: a.y, width: 15, height: 6 }, a.target) && a.target.type === "fly") { 
            obstacles.splice(obstacles.indexOf(a.target), 1); score += 2; arrows.splice(i, 1); continue; 
        }
        if (a.x > canvas.width || a.x < 0) arrows.splice(i, 1);
    }
    
    for (let i = obstacles.length - 1; i >= 0; i--) {
        let o = obstacles[i]; if (!isTimeStopped) o.x -= 5;
        if (o.type === "run") drawCactus(o.x, o.y, o.width, o.height); else drawBird(o.x, o.y, o.width, o.height);
        if (dino.isAttacking && checkCollision({ x: dino.x + dino.width, y: dino.y, width: dino.attackWidth, height: dino.height }, o)) { obstacles.splice(i, 1); score++; continue; }
        if (checkCollision(dino, o)) { if (!isInvincible) dino.hp--; obstacles.splice(i, 1); if (dino.hp <= 0) gameOver = true; }
        if (o.x + o.width < 0) obstacles.splice(i, 1);
    }

    btnTimeStop.innerText = isTimeStopped ? `THE WORLD (${Math.ceil(timeStopTimer/60)}s)` : (timeStopCooldown > 0 ? `HỒI CHIÊU (${Math.ceil(timeStopCooldown/60)}s)` : "THE WORLD (8S)");
    btnTimeStop.disabled = isTimeStopped || timeStopCooldown > 0;
    btnInvinc.innerText = isInvincible ? `BẤT TỬ (${Math.ceil(invincTimer/60)}s)` : (invincCooldown > 0 ? `HỒI CHIÊU (${Math.ceil(invincCooldown/60)}s)` : "BẤT TỬ (10S)");
    btnInvinc.disabled = isInvincible || invincCooldown > 0;
    btnSilence.innerText = isSilenced ? `KHÓA BOSS (${Math.ceil(silenceTimer/60)}s)` : (silenceCooldown > 0 ? `HỒI CHIÊU (${Math.ceil(silenceCooldown/60)}s)` : "KHỐNG CHẾ BOSS");
    btnSilence.disabled = isSilenced || silenceCooldown > 0 || !isBossMode;

    let skillName = boss.currentSkill === "shieldMinions" ? "TRIỆU HỒI QUÁI KHIÊN!" : (boss.currentSkill === "shield" ? "BẬT KHIÊN BẤT TỬ!" : (boss.currentSkill === "cactusRain8s" ? "MƯA XƯƠNG RỒNG 8S!" : (boss.currentSkill === "bomb3dmg" ? "NÉ BOM 3 ĐIỂM MÁU!" : (boss.currentSkill === "smashJump" ? "DẬM TỪ TRÊN TRỜI!" : "Tụ lực..."))));
    uiOverlay.innerText = isBossMode ? `STAGE 2 | DINO: ${dino.hp}/6 | BOSS MÀN 2: ${boss.hp}/70\nBoss đang dùng: ${isSilenced ? "BỊ KHỐNG CHẾ CHIÊU!" : (isTimeStopped ? "BỊ ĐÓNG BĂNG!" : skillName)}` : `STAGE 2 | DINO HP: ${dino.hp}/6\nĐiểm: ${score} / 10 (Đạt 10 điểm gọi Portal Boss)`;
    
    requestAnimationFrame(animate);
}
resetGame();
</script>
</body>
</html>
